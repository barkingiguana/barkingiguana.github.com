/* ─── Multi-signal recommendation engine ─── */

function getRecommendation(scores) {
  const scored = DIMENSIONS.filter(d => scores[d.id] > 0);
  if (scored.length === 0) return null;

  const values = scored.map(d => scores[d.id]);
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const spread = max - min;

  const weakDims = scored.filter(d => scores[d.id] <= 2).map(d => d.name);
  const strongDims = scored.filter(d => scores[d.id] >= 4).map(d => d.name);

  // All 5s — already leading
  if (min >= 5) {
    return {
      title: "You\u2019re leading the way",
      description: "Your organisation is operating at the highest level of AI maturity across all dimensions. That\u2019s rare and impressive. We\u2019d love to learn from your journey and explore how we might collaborate on what comes next \u2014 whether that\u2019s cutting-edge research, industry thought leadership, or emerging AI capabilities.",
      type: "excellence",
      color: "#06B6D4",
      cta: "Let\u2019s have a conversation about the frontier.",
    };
  }

  // Near-perfect — strong across the board
  if (avg >= 4.5 && min >= 4) {
    return {
      title: "AI Innovation Partnership",
      description: "You\u2019re operating at a high level of maturity across the board \u2014 the kind of organisation that\u2019s ready to explore advanced GenAI applications, competitive benchmarking, or emerging capability areas to stay ahead of the curve.",
      type: "innovation",
      color: "#06B6D4",
      cta: "Let\u2019s explore what\u2019s next together.",
    };
  }

  // Strong overall but with critical gaps
  if (avg >= 3.5 && min <= 2 && weakDims.length > 0) {
    const dimList = weakDims.length === 1 ? weakDims[0] : weakDims.slice(0, -1).join(", ") + " and " + weakDims[weakDims.length - 1];
    return {
      title: "Targeted Gap Remediation",
      description: `Your overall maturity is strong, but ${dimList} could benefit from focused attention. Addressing ${weakDims.length === 1 ? "this area" : "these areas"} would unlock the full potential of your existing strengths in ${strongDims.slice(0, 2).join(" and ")}.`,
      type: "gap",
      color: "#F97316",
      cta: "A focused engagement could close these gaps quickly.",
    };
  }

  // Uneven profile — big spread
  if (spread >= 3 && avg >= 2 && weakDims.length > 0 && strongDims.length > 0) {
    return {
      title: "AI Alignment & Integration",
      description: `There\u2019s a significant gap between your strongest areas (${strongDims.slice(0, 2).join(", ")}) and areas that could use attention (${weakDims.slice(0, 2).join(", ")}). Bringing these into alignment would multiply the impact of your existing investment.`,
      type: "alignment",
      color: "#EAB308",
      cta: "An alignment workshop could help you get the most from what you\u2019ve already built.",
    };
  }

  // Low maturity — needs strategic foundation
  if (avg < 2.0) {
    return {
      title: "AI Strategy & Governance Workshop",
      description: "There\u2019s a great opportunity to establish a clear AI vision, identify high-value use cases, and build a practical roadmap. This is where most successful AI journeys begin.",
      type: "workshop",
      color: "#EF4444",
      cta: "A focused engagement to set the right foundation.",
    };
  }

  // Mid maturity — ready to build and ship something real
  if (avg < 3.5) {
    return {
      title: "AI MVP \u2014 Build, Ship & Learn",
      description: "You\u2019ve got the foundations in place to build something real. The next step is identifying your highest-value use case, building a working AI solution, getting it into the hands of real users, and measuring the impact. Not a proof of concept that sits on a shelf \u2014 a minimum viable product that delivers value from day one.",
      type: "mvp",
      color: "#EAB308",
      cta: "A hands-on engagement to build, ship, and prove value with real users.",
    };
  }

  // High maturity — scaling
  return {
    title: "AI Scaling & Optimisation",
    description: "You\u2019re well-positioned to scale AI across the organisation. Consider exploring MLOps maturity, governance automation, and enablement programs to accelerate broader adoption.",

    color: "#22C55E",
    cta: "Let\u2019s talk about what scaling looks like for you.",
  };
}

/* ─── Radar Chart (SVG) ─── */

function RadarChart({ scores }) {
  const dims = DIMENSIONS.filter(d => scores[d.id] > 0);
  if (dims.length < 3) return null;

  const cx = 140, cy = 140, maxR = 110;
  const n = dims.length;

  const pointForDim = (i, val) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const r = (val / 5) * maxR;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  };

  const gridLevels = [1, 2, 3, 4, 5];

  return (
    <svg viewBox="0 0 280 280" style={{ width: "100%", maxWidth: 280, margin: "0 auto", display: "block" }}>
      {/* Grid */}
      {gridLevels.map(level => {
        const pts = dims.map((_, i) => pointForDim(i, level));
        return (
          <polygon key={level}
            points={pts.map(p => `${p.x},${p.y}`).join(" ")}
            fill="none" stroke="#334155" strokeWidth={level === 5 ? 1.5 : 0.5}
          />
        );
      })}
      {/* Axis lines */}
      {dims.map((_, i) => {
        const p = pointForDim(i, 5);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#334155" strokeWidth={0.5} />;
      })}
      {/* Data polygon */}
      {(() => {
        const pts = dims.map((d, i) => pointForDim(i, scores[d.id]));
        return (
          <polygon
            points={pts.map(p => `${p.x},${p.y}`).join(" ")}
            fill="#06B6D420" stroke="#06B6D4" strokeWidth={2}
          />
        );
      })()}
      {/* Data points */}
      {dims.map((d, i) => {
        const p = pointForDim(i, scores[d.id]);
        return <circle key={d.id} cx={p.x} cy={p.y} r={3.5} fill={LEVELS[scores[d.id] - 1].color} />;
      })}
      {/* Labels */}
      {dims.map((d, i) => {
        const p = pointForDim(i, 6.2);
        return (
          <text key={d.id} x={p.x} y={p.y} fill="#94A3B8" fontSize={9} fontWeight={600}
            textAnchor="middle" dominantBaseline="middle">
            {d.icon} {d.name.split(" ")[0]}
          </text>
        );
      })}
    </svg>
  );
}

/* ─── Main Component ─── */

function AIMaturityAssessment() {
  const [scores, setScores] = useState({});
  const [expanded, setExpanded] = useState({});
  const [clientName, setClientName] = useState("");
  const resultsRef = useRef(null);

  const scored = DIMENSIONS.filter(d => scores[d.id] > 0);
  const hasScores = scored.length > 0;
  const allScored = scored.length === DIMENSIONS.length;

  const values = scored.map(d => scores[d.id]);
  const avgScore = hasScores ? values.reduce((a, b) => a + b, 0) / values.length : 0;
  const overallLevel = hasScores ? LEVELS[Math.min(Math.round(avgScore) - 1, 4)] : LEVELS[0];
  const recommendation = getRecommendation(scores);

  // Active consistency warnings
  const warnings = hasScores
    ? CONSISTENCY_CHECKS.filter(c => c.check(scores))
    : [];

  // Weakest dimensions for "things to try"
  const weakestDims = scored
    .filter(d => scores[d.id] < 5)
    .sort((a, b) => scores[a.id] - scores[b.id])
    .slice(0, 3);

  const setScore = (dimId, level) => {
    setScores(prev => ({ ...prev, [dimId]: prev[dimId] === level ? 0 : level }));
  };

  const toggleExpand = (dimId) => {
    setExpanded(prev => ({ ...prev, [dimId]: !prev[dimId] }));
  };

  // Scroll to results when all scored

    if (allScored && resultsRef.current) {

          <div style={{ fontSize: 11, fontWeight: 700, color: "#06B6D4", textTransform: "uppercase", letterSpacing: 2, marginBottom: 8 }}>
            AI Maturity Assessment
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 800, color: "#F8FAFC", margin: "0 0 8px 0", lineHeight: 1.2 }}>
            How AI-ready is your organisation?
          </h1>
          <p style={{ fontSize: 14, color: "#94A3B8", maxWidth: 480, margin: "0 auto", lineHeight: 1.5 }}>
            Score each dimension to understand your current AI maturity,
            identify opportunities, and get tailored next steps.
          </p>
        </div>

        {/* Client name */}
        <div style={{ marginBottom: 24 }}>
          <input
            type="text"
            placeholder="Organisation name (optional)"
            value={clientName}
            onChange={e => setClientName(e.target.value)}
            style={{
              width: "100%", padding: "10px 14px", background: "#1E293B",
              border: "1px solid #334155", borderRadius: 8, color: "#F8FAFC",
              fontSize: 14, fontFamily: "inherit",
            }}
          />
        </div>

        {/* Dimensions */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 24 }}>
          {DIMENSIONS.map(dim => (
            <div key={dim.id} style={{ background: "#1E293B", borderRadius: 10, overflow: "hidden" }}>
              {/* Dimension header */}
              <div
                onClick={() => toggleExpand(dim.id)}
                style={{
                  padding: "14px 16px", cursor: "pointer", display: "flex",
                  alignItems: "center", gap: 10, userSelect: "none",
                }}
              >
                <span style={{ fontSize: 18 }}>{dim.icon}</span>
                <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: "#F8FAFC" }}>
                  {dim.name}
                </span>
                {scores[dim.id] > 0 && (
                  <span style={{
                    fontSize: 11, fontWeight: 700,
                    color: LEVELS[scores[dim.id] - 1].color,
                    background: `${LEVELS[scores[dim.id] - 1].color}15`,
                    padding: "3px 8px", borderRadius: 4,
                  }}>
                    {scores[dim.id]} {"\u2013"} {LEVELS[scores[dim.id] - 1].name}
                  </span>
                )}
                <span style={{ color: "#64748B", fontSize: 12, transform: expanded[dim.id] ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                  {"\u25BC"}
                </span>
              </div>

              {/* Expanded level selectors */}
              {expanded[dim.id] && (
                <div style={{ padding: "0 16px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                  {dim.descriptors.map((desc, i) => (
                    <div
                      key={i}
                      onClick={() => setScore(dim.id, i + 1)}
                      style={{
                        padding: "12px 14px", borderRadius: 8,
                        background: scores[dim.id] === i + 1 ? `${LEVELS[i].color}12` : "#0F172A",
                        border: scores[dim.id] === i + 1 ? `1px solid ${LEVELS[i].color}50` : "1px solid #1E293B",
                        cursor: "pointer", transition: "all 0.15s",
                      }}
                    >
                      {/* Level badge */}
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                        <div style={{
                          width: 24, height: 24, borderRadius: "50%",
                          background: scores[dim.id] === i + 1 ? LEVELS[i].color : "#334155",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 12, fontWeight: 700,
                          color: scores[dim.id] === i + 1 ? "#0F172A" : "#94A3B8",
                          flexShrink: 0,
                        }}>
                          {i + 1}
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: LEVELS[i].color }}>
                          {LEVELS[i].name}
                        </div>
                      </div>

                      {/* Summary */}
                      <div style={{ fontSize: 12, color: "#CBD5E1", marginBottom: 8, fontWeight: 500 }}>
                        {desc.summary}
                      </div>

                      {/* Signals */}
                      <div style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.6, marginBottom: 8 }}>
                        <div style={{ fontWeight: 600, color: "#64748B", fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>
                          Look for these signals:
                        </div>
                        {desc.signals.map((s, j) => (
                          <div key={j} style={{ display: "flex", gap: 6, marginBottom: 3 }}>
                            <span style={{ color: LEVELS[i].color, flexShrink: 0 }}>{"\u2022"}</span>
                            <span>{s}</span>

                      </div>

                      {/* Client typically says */}
                      <div style={{
                        fontSize: 12, color: "#CBD5E1", fontStyle: "italic",
                        background: "#06B6D408", padding: "8px 10px", borderRadius: 6,
                        borderLeft: `2px solid ${LEVELS[i].color}40`,

                        <span style={{
                          fontSize: 10, fontWeight: 600, color: "#64748B",
                          textTransform: "uppercase", letterSpacing: 0.5,
                          fontStyle: "normal", display: "block", marginBottom: 2,
                        }}>
                          Client typically says:
                        </span>
                        {desc.clientSays}
                      </div>
                    </div>

                </div>

            </div>

        {/* ─── No scores yet — offer expert assessment ─── */}

            <div style={{ fontSize: 14, fontWeight: 700, color: "#F8FAFC", marginBottom: 8 }}>

            <div style={{ fontSize: 13, color: "#94A3B8", lineHeight: 1.6, marginBottom: 16, maxWidth: 440, margin: "0 auto 16px" }}>

            <a href={CONTACT_URL} target="_blank" rel="noopener noreferrer" style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              padding: "10px 24px",
              background: "#06B6D4", borderRadius: 6,
              fontSize: 13, fontWeight: 700, color: "#0F172A",
              textDecoration: "none", cursor: "pointer",

          <div ref={resultsRef} className="fade-in" style={{ background: "#1E293B", borderRadius: 12, padding: 24, marginBottom: 24 }}>

            {/* Overall score */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 20 }}>
              <span style={{ fontSize: 28, fontWeight: 800, color: overallLevel.color }}>
                {avgScore.toFixed(1)}
              </span>
              <span style={{ fontSize: 14, color: "#94A3B8" }}>/ 5.0</span>
              <span style={{ fontSize: 14, color: overallLevel.color, fontWeight: 600, marginLeft: 4 }}>
                Overall: {overallLevel.name}
              </span>
            </div>

            {/* Radar chart */}
            <RadarChart scores={scores} />

            {/* Per-dimension bars */}
            <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 6 }}>
              {DIMENSIONS.map(dim => scores[dim.id] > 0 && (
                <div key={dim.id} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 12px", background: "#0F172A", borderRadius: 6,
                }}>
                  <span style={{ fontSize: 14 }}>{dim.icon}</span>
                  <span style={{ fontSize: 13, color: "#CBD5E1", flex: 1 }}>{dim.name}</span>
                  <div style={{ width: 120, height: 6, background: "#334155", borderRadius: 3, overflow: "hidden" }}>
                    <div style={{
                      width: `${(scores[dim.id] / 5) * 100}%`, height: "100%",
                      background: LEVELS[scores[dim.id] - 1].color,
                      borderRadius: 3, transition: "width 0.3s",
                    }} />
                  </div>
                  <span style={{
                    fontSize: 12, color: LEVELS[scores[dim.id] - 1].color,
                    fontWeight: 600, minWidth: 70, textAlign: "right",
                  }}>

            {/* Consistency warnings */}

                borderRadius: 8, borderLeft: `3px solid ${recommendation.color}`,

                <div style={{ fontSize: 13, fontWeight: 700, color: recommendation.color, marginBottom: 6 }}>

                  {recommendation.description}

                <div style={{ fontSize: 12, color: "#CBD5E1", marginBottom: 14, fontStyle: "italic" }}>
                  {recommendation.cta}
                </div>
                <a href={CONTACT_URL} target="_blank" rel="noopener noreferrer" style={{
                  display: "inline-flex", alignItems: "center", gap: 6,
                  padding: "10px 20px",

                  fontSize: 13, fontWeight: 700, color: "#0F172A",
                  textDecoration: "none", cursor: "pointer",
                  boxShadow: `0 0 20px ${recommendation.color}30`,
                }}>
                  Talk to our AI team {"\u2192"}
                </a>
              </div>
            )}

            {/* Per-dimension next steps (top 3 weakest that aren't already at 5) */}
            {weakestDims.length > 0 && (
              <div style={{ marginTop: 20 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#94A3B8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
                  Things to try
                </div>
                {weakestDims.map(dim => (
                  <div key={dim.id} style={{
                    padding: "12px 14px", background: "#0F172A",
                    borderRadius: 6, marginBottom: 6,
                    borderLeft: `3px solid ${LEVELS[scores[dim.id] - 1].color}`,

                    <div style={{ fontSize: 12, fontWeight: 600, color: "#CBD5E1", marginBottom: 4 }}>

                      }}>

                      </span>
                    </div>
                    <div style={{ fontSize: 12, color: "#94A3B8", lineHeight: 1.6 }}>
                      {NEXT_STEPS[dim.id][scores[dim.id]]}
                    </div>
                  </div>
                ))}

                {/* Closing CTA */}
                <div style={{
                  marginTop: 14, padding: "18px 20px", background: "#06B6D408",
                  borderRadius: 8, border: "1px solid #06B6D425",
                  textAlign: "center",
                }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#F8FAFC", marginBottom: 6 }}>
                    Want help making this happen?
                  </div>
                  <div style={{ fontSize: 12, color: "#94A3B8", lineHeight: 1.6, marginBottom: 14, maxWidth: 440, margin: "0 auto 14px" }}>
                    We help organisations move from assessment to action. Let{"\u2019"}s talk about where you are and what{"\u2019"}s possible.
                  </div>
                  <a href={CONTACT_URL} target="_blank" rel="noopener noreferrer" style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    padding: "10px 24px",
                    background: "#06B6D4", borderRadius: 6,
                    fontSize: 13, fontWeight: 700, color: "#0F172A",
                    textDecoration: "none", cursor: "pointer",
                    boxShadow: "0 0 20px #06B6D430",
                  }}>
                    Get in touch {"\u2192"}
                  </a>

            {/* Unscored dimensions — offer expert assessment */}
            {!allScored && (
              <div style={{
                marginTop: 16, padding: "14px 16px",

</script>
