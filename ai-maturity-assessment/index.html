    if(dim.id==="strategy"){

    if(dim.id==="data"){
      if(dim.score<=1) steps.push({title:"Get your data house in order",description:"AI is only as good as the data feeding it. You need to consolidate your data sources, establish quality baselines, and build a foundation that AI can actually work with.",stage:GROWTH_STAGES[0],priority:"high",upliftPoints:2});

      else steps.push({title:"Build a self-service data platform",description:"Your data foundation is strong. Level up with a data marketplace, automated quality monitoring, and real-time availability that empowers every team.",stage:GROWTH_STAGES[2],priority:"medium",upliftPoints:1});
    }
    if(dim.id==="technology"){
      if(dim.score<=2) steps.push({title:"Stand up a proper AI platform",description:"You need to move beyond ad-hoc notebooks and manual deployments. A standardised ML platform with CI/CD and experiment tracking will let your team move fast without breaking things.",stage:GROWTH_STAGES[3],priority:"high",upliftPoints:2});

    }
    if(dim.id==="talent"){
      if(dim.score<=2) steps.push({title:"Build your AI team and skills",description:"AI can't run on enthusiasm alone. You need dedicated practitioners, a training programme, and enough internal capability to evaluate what partners deliver.",stage:GROWTH_STAGES[3],priority:"high",upliftPoints:2});
      else steps.push({title:"Spread AI fluency across the business",description:"Your core team is solid. Now embed AI champions in every business unit and build a culture where non-technical staff can leverage AI effectively.",stage:GROWTH_STAGES[4],priority:"medium",upliftPoints:1});
    }
    if(dim.id==="governance"){
      if(dim.score<=2) steps.push({title:"Establish AI governance and policies",description:"Without governance, you're one bad headline away from serious trouble. Define risk tiers, implement an AI usage policy, and start testing for bias on customer-facing models.",stage:GROWTH_STAGES[2],priority:"high",upliftPoints:2});
      else steps.push({title:"Automate compliance and deepen responsible AI",description:"Good governance foundations. Now automate compliance checks in your CI/CD pipeline, establish a review board, and align with international standards.",stage:GROWTH_STAGES[5],priority:"medium",upliftPoints:1});
    }
    if(dim.id==="operations"){
      if(dim.score<=2) steps.push({title:"Get AI into production properly",description:"Demos don't deliver business value \u2014 production systems do. You need monitoring, SLAs, runbooks, and an on-call approach that treats AI systems like the critical infrastructure they are.",stage:GROWTH_STAGES[4],priority:"high",upliftPoints:2});

    }
  });

  // Deduplicate by title and limit to 2
  const seen=new Set();
  return steps.filter(s=>{if(seen.has(s.title))return false;seen.add(s.title);return true;}).slice(0,2);
}

function encodeScores(scores){
  const p=new URLSearchParams();
  Object.entries(scores).forEach(([k,v])=>{if(v>0)p.set(k,v)});
  return p.toString();
}
function decodeScores(){
  const p=new URLSearchParams(window.location.search);
  const scores={};const dims=["strategy","data","technology","talent","governance","operations"];
  dims.forEach(d=>{const v=parseInt(p.get(d));scores[d]=v>=1&&v<=5?v:0});
  return{scores};
}
async function submitToHubSpot(fields){
  try{const r=await fetch(HUBSPOT_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields:Object.entries(fields).map(([name,value])=>({name,value:String(value)})),
      context:{pageUri:window.location.href,pageName:"AI Maturity Assessment"}})});return r.ok}
  catch(e){console.error("HubSpot error:",e);return false}
}

const RadarChart=({scores})=>{
  const w=460,h=340,cx=w/2,cy=h/2,maxR=110,lvls=5;
  const step=(2*Math.PI)/DIMENSIONS.length,start=-Math.PI/2;
  const pt=(i,v)=>{const a=start+i*step,r=(v/lvls)*maxR;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}};
  const grid=[];
  for(let l=1;l<=lvls;l++){const ps=DIMENSIONS.map((_,i)=>pt(i,l));
    grid.push(<path key={l} d={ps.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z"} fill="none" stroke="#334155" strokeWidth="1" opacity={.4}/>)}
  const axes=DIMENSIONS.map((_,i)=>{const e=pt(i,lvls);return<line key={i} x1={cx} y1={cy} x2={e.x} y2={e.y} stroke="#334155" strokeWidth="1" opacity={.4}/>});
  const sps=DIMENSIONS.map((d,i)=>pt(i,scores[d.id]||0));
  const sp=sps.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z";
  const labels=DIMENSIONS.map((d,i)=>{const p=pt(i,lvls+1.2),a=start+i*step;
    return<text key={d.id} x={p.x} y={p.y} textAnchor={Math.cos(a)<-.1?"end":Math.cos(a)>.1?"start":"middle"} dominantBaseline="middle" fill="#94A3B8" fontSize="11" fontWeight="500">{d.icon} {d.name}</text>});
  return(<svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",maxWidth:480,margin:"0 auto",display:"block"}}>
    {grid}{axes}
    <path d={sp} fill="rgba(6,182,212,.15)" stroke="#06B6D4" strokeWidth="2"/>
    {sps.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="5" fill="#06B6D4" stroke="#0F172A" strokeWidth="2"/>)}
    {labels}
    {[1,2,3,4,5].map(n=>{const p=pt(0,n);return<text key={n} x={p.x+6} y={p.y-4} fill="#64748B" fontSize="9">{n}</text>})}
  </svg>);
};

// Maturity Growth Chart showing "You are here" and "You could be here"
const MaturityGrowthChart=({currentAvg,projectedAvg})=>{
  const currentLevel=Math.max(1,Math.min(5,Math.round(currentAvg)));
  const projectedLevel=Math.min(5,Math.max(currentLevel,Math.round(projectedAvg)));

  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:600,color:"#06B6D4",textTransform:"uppercase",letterSpacing:1.2,marginBottom:4}}>Your AI Maturity Journey</div>
      <div style={{fontSize:15,fontWeight:700,color:"#F8FAFC",marginBottom:20}}>Where you are — and where you could be</div>

      {/* Growth stage boxes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5, 1fr)",gap:6,marginBottom:8}}>
        {LEVELS.map((level,i)=>{
          const isCurrent=level.id===currentLevel;
          const isProjected=level.id===projectedLevel&&projectedLevel!==currentLevel;
          const isPast=level.id<currentLevel;
          const isBetween=level.id>currentLevel&&level.id<projectedLevel;
          let bg=`${level.color}15`;
          let border=`1px solid ${level.color}30`;
          if(isCurrent){bg=`${level.color}40`;border=`2px solid ${level.color}`}
          else if(isProjected){bg=`${level.color}25`;border=`2px dashed ${level.color}`}
          else if(isPast){bg=`${level.color}30`;border=`1px solid ${level.color}50`}
          else if(isBetween){bg=`${level.color}20`;border=`1px dashed ${level.color}40`}
          return(
            <div key={level.id} style={{position:"relative"}}>
              <div style={{background:bg,border,borderRadius:8,padding:"12px 6px",textAlign:"center",minHeight:68,display:"flex",flexDirection:"column",justifyContent:"center",overflow:"hidden"}}>
                <div style={{fontSize:10,fontWeight:700,color:level.color,marginBottom:2}}>{level.name}</div>
                <div style={{fontSize:9,color:"#94A3B8",lineHeight:1.3}}>{level.description}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Markers below the boxes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5, 1fr)",gap:6,marginBottom:12}}>
        {LEVELS.map((level)=>{
          const isCurrent=level.id===currentLevel;
          const isProjected=level.id===projectedLevel&&projectedLevel!==currentLevel;
          return(
            <div key={level.id} style={{textAlign:"center",minHeight:24}}>
              {isCurrent&&(
                <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
                  <div style={{width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderBottom:"5px solid #06B6D4",marginBottom:1}}/>
                  <div style={{fontSize:9,fontWeight:700,color:"#06B6D4",background:"#06B6D420",padding:"2px 6px",borderRadius:3,border:"1px solid #06B6D4",whiteSpace:"nowrap"}}>You are here</div>
                </div>
              )}
              {isProjected&&(
                <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
                  <div style={{width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderBottom:"5px solid #2DD4BF",marginBottom:1}}/>
                  <div style={{fontSize:9,fontWeight:700,color:"#2DD4BF",background:"#2DD4BF20",padding:"2px 6px",borderRadius:3,border:"1px dashed #2DD4BF",whiteSpace:"nowrap"}}>You could be here</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Progress arrow */}
      {projectedLevel>currentLevel&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:12}}>
          <div style={{fontSize:11,color:"#64748B"}}>Level {currentLevel}</div>
          <div style={{flex:1,maxWidth:200,height:2,background:"linear-gradient(90deg,#06B6D4,#2DD4BF)",borderRadius:1,position:"relative"}}>
            <div style={{position:"absolute",right:-6,top:-4,width:0,height:0,borderTop:"5px solid transparent",borderBottom:"5px solid transparent",borderLeft:"8px solid #2DD4BF"}}/>
          </div>
          <div style={{fontSize:11,color:"#2DD4BF",fontWeight:600}}>Level {projectedLevel}</div>
        </div>
      )}

      <p style={{fontSize:12,color:"#94A3B8",lineHeight:1.6,margin:0}}>
        {projectedLevel>currentLevel
          ?`By taking the recommended next steps below, you could move from Level ${currentLevel} (${LEVELS[currentLevel-1].name}) to Level ${projectedLevel} (${LEVELS[projectedLevel-1].name}). That's a significant shift in AI maturity.`
          :`You're at Level ${currentLevel} (${LEVELS[currentLevel-1].name}). You're performing well \u2014 the next steps below will help you sharpen and optimise what you already have.`
        }
      </p>
    </div>
  );
};

function App(){
  const init=decodeScores();
  const[scores,setScores]=useState(init.scores);
  const[orgName,setOrgName]=useState("");
  const[showDetail,setShowDetail]=useState(null);
  const[contactEmail,setContactEmail]=useState("");
  const[contactPhone,setContactPhone]=useState("");
  const[contactName,setContactName]=useState("");
  const[submitted,setSubmitted]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[copied,setCopied]=useState(false);
  const[showContactForm,setShowContactForm]=useState(false);
  const resultsRef=useRef(null);
  const contactFormRef=useRef(null);
  const dimRefs=useRef({});

  const avgScore=Object.values(scores).reduce((a,b)=>a+b,0)/DIMENSIONS.length;
  const overallLevel=LEVELS[Math.max(0,Math.min(4,Math.round(avgScore)-1))]||LEVELS[0];
  const handleScore=(dimId,level)=>setScores(prev=>({...prev,[dimId]:prev[dimId]===level?0:level}));

  // When a descriptor card is clicked inside an expanded panel, set the score,
  // collapse the current panel, and open+scroll to the next one.
  const handleDetailSelect=(dimId,level)=>{
    setScores(prev=>({...prev,[dimId]:level}));
    const idx=DIMENSIONS.findIndex(d=>d.id===dimId);
    if(idx<DIMENSIONS.length-1){
      const nextId=DIMENSIONS[idx+1].id;
      setShowDetail(nextId);
      setTimeout(()=>{
        const el=dimRefs.current[nextId];
        if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
      },100);
    }else{
      setShowDetail(null);
    }
  };
  const hasScores=Object.values(scores).some(s=>s>0);
  const allScored=Object.values(scores).every(s=>s>0);
  const outcome=OUTCOMES.find(o=>avgScore<=o.maxAvg)||OUTCOMES[OUTCOMES.length-1];
  const nextSteps=allScored?getNextSteps(scores):[];
  const completedCount=Object.values(scores).filter(s=>s>0).length;

  // Calculate projected score after taking next steps
  const projectedAvg=allScored?Math.min(5,avgScore+(nextSteps.reduce((sum,s)=>sum+s.upliftPoints,0)/DIMENSIONS.length)):avgScore;

  const handleShare=()=>{
    const url=window.location.origin+window.location.pathname+"?"+encodeScores(scores);
    if(navigator.clipboard)navigator.clipboard.writeText(url);
    else{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t)}
    setCopied(true);setTimeout(()=>setCopied(false),2500);
  };

  const handleContactSubmit=async()=>{
    if(!contactEmail&&!contactPhone)return;setSubmitting(true);
    const fields={email:contactEmail,phone:contactPhone,firstname:contactName,company:orgName,

      ai_talent_score:scores.talent,ai_governance_score:scores.governance,ai_operations_score:scores.operations,
      ai_recommended_service:outcome.service,ai_next_steps:nextSteps.map(s=>s.title).join("; ")};
    await submitToHubSpot(fields);setSubmitting(false);setSubmitted(true);
  };

  useEffect(()=>{if(allScored&&resultsRef.current)setTimeout(()=>resultsRef.current.scrollIntoView({behavior:"smooth",block:"start"}),300)},[allScored]);

  return(
    <div style={{fontFamily:"'DM Sans',-apple-system,sans-serif",background:"#0F172A",color:"#E2E8F0",minHeight:"100vh",padding:"24px 16px"}}>

        {/* Header */}

          <div style={{width:40,height:40,background:"linear-gradient(135deg,#06B6D4,#2DD4BF)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,color:"#0F172A"}}>M</div>
          <div>
            <div style={{fontSize:11,color:"#06B6D4",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>Mechanical Rock</div>

        </p>

        {/* Progress */}

                  <div style={{flex:1,height:6,background:"#334155",borderRadius:3,overflow:"hidden",minWidth:80}}>
                    <div style={{width:`${(scores[dim.id]/5)*100}%`,height:"100%",background:scores[dim.id]>0?LEVELS[scores[dim.id]-1].color:"#334155",borderRadius:3,transition:"width .3s"}}/>
                  </div>

                      ):(
                        <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:10,maxWidth:400}}>
                          <input type="text" placeholder="Your name" value={contactName} onChange={e=>setContactName(e.target.value)}
                            style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",color:"#F8FAFC",fontSize:14,width:"100%",boxSizing:"border-box"}}/>
                          <input type="text" placeholder="Organisation name" value={orgName} onChange={e=>setOrgName(e.target.value)}
                            style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",color:"#F8FAFC",fontSize:14,width:"100%",boxSizing:"border-box"}}/>
                          <input type="email" placeholder="Email address" value={contactEmail} onChange={e=>setContactEmail(e.target.value)}
                            style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",color:"#F8FAFC",fontSize:14,width:"100%",boxSizing:"border-box"}}/>
                          <input type="tel" placeholder="Phone number (optional)" value={contactPhone} onChange={e=>setContactPhone(e.target.value)}
                            style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",color:"#F8FAFC",fontSize:14,width:"100%",boxSizing:"border-box"}}/>
                          <button onClick={handleContactSubmit} disabled={submitting||(!contactEmail&&!contactPhone)}
                            style={{background:(!contactEmail&&!contactPhone)?"#334155":"linear-gradient(135deg,#06B6D4,#2DD4BF)",color:(!contactEmail&&!contactPhone)?"#64748B":"#0F172A",border:"none",borderRadius:8,padding:"12px 20px",fontSize:14,fontWeight:700,cursor:(!contactEmail&&!contactPhone)?"default":"pointer",opacity:submitting?.7:1,animation:submitting?"pulse 1.5s infinite":"none"}}>
                            {submitting?"Sending...":outcome.ctaLabel}
                          </button>
                        </div>
                      )}
                    </>
                  )}
                </div>

              </div>
            )}
          </div>
        )}

        <div style={{textAlign:"center",color:"#475569",fontSize:11,padding:"16px 0",lineHeight:1.6}}>
          Mechanical Rock {"\u2014"} Cloud-Native Consulting Partner {"\u00B7"} AI & ML Solutions Practice {"\u00B7"} Perth, Western Australia
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
